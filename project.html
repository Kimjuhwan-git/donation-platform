<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>프로젝트 후원</title>

    <link rel="stylesheet" href="project.css">

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

<div class="phone">

    <!-- 상단 -->
    <header>

        <button class="backBtn" onclick="history.back()">
            ←
        </button>

        <h1>프로젝트 후원</h1>

    </header>

    <!-- 프로젝트 이미지 -->

    <img
    class="projectImage"
    id="projectImage"
    src=""
    alt="프로젝트 이미지">

    <!-- 내용 -->

    <section class="projectCard">

        <span class="category">
            🚸 교통
        </span>

        <h2>
            횡단보도 LED 바닥신호등 설치
        </h2>

        <p class="subTitle">

            야간 교통사고 예방을 위해
            LED 바닥신호등을 설치하는 프로젝트입니다.

        </p>

        <!-- 진행률 -->

        <div class="progressArea">

            <div class="money">

                <div>

                    <p>현재 모금액</p>

                    <h3>15,200,000원</h3>

                </div>

                <div class="goal">

                    목표

                    <br>

                    20,000,000원

                </div>

            </div>

            <div class="progress">

                <div class="bar"></div>

            </div>

            <div class="percent">

                76% 달성

                ·

                824명이 함께했습니다.

            </div>

        </div>

    </section>

    <!-- 프로젝트 설명 -->

    <section class="descriptionCard">

        <h3>프로젝트 소개</h3>

        <p>

            야간에는 스마트폰을 보며 횡단보도를 건너는 보행자가 많아
            교통사고 위험이 높습니다.

            시민 여러분의 후원으로
            LED 바닥신호등을 설치하여
            안전한 보행환경을 만들고자 합니다.

        </p>

    </section>

    <!-- 후원금 선택 -->

    <section class="donationCard">

        <h3>후원 금액 선택</h3>

        <div class="amounts">

            <button class="amount">
                100원
            </button>

            <button class="amount">
                500원
            </button>

            <button class="amount">
                1,000원
            </button>

        </div>

        <input
            type="number"
            id="customAmount"
            placeholder="직접 입력 (원)">

    </section>

    <!-- 결제 -->

    <section class="paymentCard">

        <h3>결제 수단</h3>

        <button class="naver">

            네이버페이로 후원하기

        </button>

        <button class="kakao">

            카카오페이로 후원하기

        </button>

        <button class="toss">

            토스페이로 후원하기

        </button>

    </section>

</div>

<script src="project.js"></script>

</body>

</html>

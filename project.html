<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>프로젝트 후원</title>

    <link rel="stylesheet" href="project.css">

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

<div class="phone">

    <!-- 상단 -->
    <header>

        <button class="backBtn" onclick="history.back()">
            ←
        </button>

        <h1>프로젝트 후원</h1>

    </header>


    <!-- 프로젝트 이미지 -->
    <img
        class="projectImage"
        id="projectImage"
        src=""
        alt="프로젝트 이미지">


    <!-- 프로젝트 기본 정보 -->
    <section class="projectCard">

        <!-- 카테고리 -->
        <span class="category" id="projectCategory">
        </span>

        <!-- 프로젝트 제목 -->
        <h2 id="projectTitle">
        </h2>

        <!-- 프로젝트 한 줄 설명 -->
        <p class="subTitle" id="projectSubTitle">
        </p>


        <!-- 진행률 -->
        <div class="progressArea">

            <div class="money">

    <div>

        <p>현재 모금액</p>

        <h3 id="currentAmount">
            0원
        </h3>

    </div>

    <div class="goal">

        목표

        <br>

        <span id="goalAmount">
            0원
        </span>

    </div>

</div>


<div class="progress">

    <div
        class="bar"
        id="progressBar">
    </div>

</div>


<div
    class="percent"
    id="projectPercent">

    0% 달성 · 0명이 함께했습니다.

</div>

        </div>

    </section>


    <!-- 프로젝트 설명 -->
    <section class="descriptionCard">

        <h3>프로젝트 소개</h3>

        <p id="projectDescription">
        </p>

    </section>


    <!-- 후원금 선택 -->
    <!-- 모든 카테고리 동일 -->

    <section class="donationCard">

        <h3>후원 금액 선택</h3>

        <div class="amounts">

            <button class="amount">
                100원
            </button>

            <button class="amount">
                500원
            </button>

            <button class="amount">
                1,000원
            </button>

        </div>

        <input
            type="number"
            id="customAmount"
            placeholder="직접 입력 (원)">

    </section>


    <!-- 결제 -->
    <!-- 모든 카테고리 동일 -->

    <section class="paymentCard">

        <h3>결제 수단</h3>

        <button class="naver">

            네이버페이로 후원하기

        </button>

        <button class="kakao">

            카카오페이로 후원하기

        </button>

        <button class="toss">

            토스페이로 후원하기

        </button>

    </section>

</div>


<script src="project.js"></script>

</body>

</html>
